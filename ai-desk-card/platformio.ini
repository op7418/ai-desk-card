; ai-desk-card — independent build env for the v0.5 sub-project. Same target
; hardware as ../platformio.ini's env:m5paper (M5Paper V1.1, 16 MB flash,
; CJK font on LittleFS) but separate src tree + simplified main loop.
;
; Build:
;   pio run -e card                 # compile
;   pio run -e card -t uploadfs     # flash data/ (CJK font) to LittleFS
;   pio run -e card -t upload       # flash firmware

[env:card]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.psram = enabled
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCARD_VERSION="\"0.8.0\""
lib_deps =
    m5stack/M5EPD @ ^0.1.5
    bblanchon/ArduinoJson @ ^7.0.0
