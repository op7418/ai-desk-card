; ai-desk-card — independent build env for the v0.5 sub-project. Same target
; hardware as ../platformio.ini's env:m5paper (M5Paper V1.1, 16 MB flash,
; CJK font on LittleFS) but separate src tree + simplified main loop.
;
; Build:
;   pio run -e card                 # compile
;   pio run -e card -t uploadfs     # flash data/ (CJK font) to LittleFS
;   pio run -e card -t upload       # flash firmware

[env:card]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.psram = enabled
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCARD_VERSION="\"0.9.0\""
lib_deps =
    m5stack/M5EPD @ ^0.1.5
    bblanchon/ArduinoJson @ ^7.0.0
build_src_filter = +<*> -<paper_color/>


; ----------------------------------------------------------------------------
; env:paper-color — M5Paper Color (ESP32-S3R8 + 4" Spectra 6 600×400 e-ink)
;
; Port in progress (v0.10.0). Key differences from env:card:
;   - ESP32-S3 native USB CDC (/dev/cu.usbmodem*, not usbserial*)
;   - Spectra 6 6-color panel (EL040EF1) instead of 16-grayscale GDEW
;   - 3 physical buttons + power btn (no touch panel)
;   - SHT40 temp+humidity + ES8311 audio + 2x RGB LED + IR emitter
;   - M5Unified library handles all panel/IO abstraction
;
; Build:
;   pio run -e paper-color           # compile
;   pio run -e paper-color -t upload # flash (USB-C native CDC)
[env:paper-color]
platform = espressif32 @ 6.12.0
board = esp32s3box
framework = arduino
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCARD_VERSION="\"0.10.0-color\""
lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX
    bblanchon/ArduinoJson @ ^7.0.0
build_src_filter = -<*> +<paper_color/>
